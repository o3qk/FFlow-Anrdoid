name: FFlowApp Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build FFlowApp APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | head -300

      - name: 🔍 Find APK
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fflowapp-debug-apk
          path: |
            app/build/outputs/apk/**/*.apk
