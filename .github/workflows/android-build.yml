name: FFlowApp Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build FFlowApp APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔍 Debug info
        run: |
          echo "Java: $(java -version 2>&1)"
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "No ANDROID_HOME"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"
          echo "local.properties: $(cat $GITHUB_WORKSPACE/local.properties 2>/dev/null || echo 'not found')"

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -100

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fflowapp-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
